<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Discovery Mapping Test Form</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    fieldset { margin-bottom: 20px; padding: 16px; }
    label { display: block; margin: 8px 0; }
    textarea { width: 420px; height: 70px; }
    .collapsed-panel { display: none; }
    .collapsed-panel.active { display: block; }
  </style>
  <script>
    function showCollapsedSection() {
      document.getElementById('diagnostics-panel').classList.add('active');
    }
  </script>
</head>
<body>
  <h1>Behavioral Health Intake</h1>
  <button type="button" aria-controls="diagnostics-panel" onclick="showCollapsedSection()">Diagnostics Section</button>
  <form>
    <fieldset>
      <legend>Mental Status Exam</legend>
      <label for="appearance_other">Appearance Other</label>
      <textarea id="appearance_other" name="appearance_other" placeholder="Unknown - Interview conducted via phone call"></textarea>

      <label>
        <input type="checkbox" name="attitude" value="cooperative">
        Cooperative
      </label>
      <label>
        <input type="checkbox" name="attitude" value="guarded">
        Guarded
      </label>

      <label for="mood">Mood</label>
      <select id="mood" name="mood">
        <option>Euthymic</option>
        <option>Anxious</option>
        <option>Depressed</option>
        <option>Other</option>
      </select>
    </fieldset>

    <fieldset>
      <legend>ASAM Criteria</legend>
      <label for="dimension_one">Dimension 1 Narrative</label>
      <textarea id="dimension_one" name="dimension_one"></textarea>

      <label>
        <input type="radio" name="dimension_one_severity" value="0">
        None
      </label>
      <label>
        <input type="radio" name="dimension_one_severity" value="1">
        Mild
      </label>
      <label>
        <input type="radio" name="dimension_one_severity" value="2">
        Moderate
      </label>
    </fieldset>

    <h2>QuickNotes: Mental Health Status Exam Part 2</h2>
    <table>
      <tbody>
        <tr>
          <td><strong>1.</strong></td>
          <td><strong>Perception</strong></td>
          <td>
            <label for="cb-10371">
              <input type="checkbox" class="qn-editable-cb" data-qn-field-id="10371" id="cb-10371">
              Within normal limits
            </label>
          </td>
          <td>
            <label for="cb-10372">
              <input type="checkbox" class="qn-editable-cb" data-qn-field-id="10372" id="cb-10372">
              Illusions
            </label>
          </td>
        </tr>
        <tr>
          <td>&nbsp;</td>
          <td>&nbsp;</td>
          <td>
            <label for="cb-10376">
              <input type="checkbox" class="qn-editable-cb" data-qn-field-id="10376" id="cb-10376">
              Other:
            </label>
          </td>
          <td class="qn-editable textarea-wrapper" data-qn-field-id="10377">
            <textarea class="qn-textarea"></textarea>
          </td>
        </tr>
      </tbody>
    </table>
    <section id="diagnostics-panel" class="collapsed-panel">
      <h2>Diagnostics Part 4</h2>
      <label for="diagnostic_summary">Diagnostic Summary</label>
      <textarea id="diagnostic_summary" name="diagnostic_summary"></textarea>
    </section>
  </form>
</body>
</html>
